<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome</title>
  <style>
    
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #0f172a, #111827);
      color: #22d3ee;
    }

    
    #welcomeText {
      font-size: 2.5rem;
      text-align: center;
      opacity: 0;
      transform: scale(0.8);
      animation: fadeInScale 1.5s forwards;
    }

    @keyframes fadeInScale {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #22d3ee;
      border-radius: 50%;
      opacity: 0.6;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0); opacity: 0.6; }
      50% { opacity: 1; }
      100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
    }

    
    #welcomeText {
      animation: fadeInScale 1.5s forwards, pulse 2s infinite alternate;
    }

    @keyframes pulse {
      from { text-shadow: 0 0 5px #22d3ee, 0 0 10px #22d3ee; }
      to { text-shadow: 0 0 20px #22d3ee, 0 0 40px #22d3ee; }
    }
  </style>
</head>
<body>
  <div id="welcomeText">Welcome to our site</div>

  <script>
    
    const numParticles = 40;
    for (let i = 0; i < numParticles; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.style.left = Math.random() * window.innerWidth + 'px';
      p.style.top = Math.random() * window.innerHeight + 'px';
      p.style.animationDuration = (3 + Math.random() * 5) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 6) + 'px';
      document.body.appendChild(p);
    }

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 3000);
  </script>
</body>
</html>
